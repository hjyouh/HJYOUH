  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000000;
      font-family: 'SUITE', 'Poppins', sans-serif;
      overflow-y: scroll;
      padding-bottom: 110px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 20px;
      margin: 0;
      background: #000000;
      position: sticky;
      top: 0;
      z-index: 100;
      box-sizing: border-box;
      border-bottom: 1px solid #3a3a3a;
    }
    .header-logo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .hamburger {
      font-size: 18px;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      background: none;
      border: none;
      margin-left: auto;
    }

    /* ===== DRAWER ===== */
    .drawer {
      position: fixed;
      top: 0; right: 0;
      width: 120px;
      height: 100%;
      background: rgba(10, 10, 10, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 999;
      padding: 56px 20px;
      box-sizing: border-box;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .drawer.open { transform: translateX(0); }
    .drawer a {
      display: block;
      color: #cccccc;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 6px;
      font-family: 'Poppins', 'SUITE', sans-serif;
    }
    .drawer-close {
      position: absolute;
      top: 16px; right: 16px;
      font-size: 16px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      background: none;
      border: none;
    }

    .card-container {
      padding: 0 1px;
      margin-top: 5px;
    }
    .tab-card-wrap {
      overflow: hidden;
    }
  </style>
</head>

            <image href="../../assets/images/main4.png"  x="720"  y="0" width="360" height="280" preserveAspectRatio="xMidYMid slice"/>

  <script>
    // ===== 드로어 =====
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
    }

    // ===== 슬라이드 (rAF + SVG transform attribute — SVG 유저 유닛 기준) =====
    let current = 0;
    let currentX = 0;
    let animating = false;
    const total = 4;
    const slideW = 360; // SVG viewBox 폭과 동일

    function animateTo(targetX) {
      const startX = currentX;
      const startTime = performance.now();
      const duration = 480;
      animating = true;

      function step(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3); // ease-out cubic
        const x = startX + (targetX - startX) * ease;
        document.getElementById('slideTrack')
          .setAttribute('transform', 'translate(' + x + ',0)');
        if (t < 1) {
          requestAnimationFrame(step);
        } else {
          currentX = targetX;
          animating = false;
        }
      }
      requestAnimationFrame(step);
    }

    function goSlide(n) {
      if (animating) return;
      current = (n + total) % total;
      animateTo(-slideW * current);
      ['dot0','dot1','dot2','dot3'].forEach((id, i) => {
        document.getElementById(id)
          .setAttribute('fill', i === current ? '#ffffff' : '#555555');
      });
    }
    function prevSlide() { goSlide(current - 1); }
    function nextSlide() { goSlide(current + 1); }
    setInterval(() => goSlide(current + 1), 4000);

    // ===== 스크롤바 =====
    let scrollTimer;
    document.addEventListener('scroll', function() {
      document.body.classList.add('is-scrolling');
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(function() {
        document.body.classList.remove('is-scrolling');
      }, 800);
    });
  </script>
