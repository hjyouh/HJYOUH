<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>작업들 - aimt</title>
  <link rel="stylesheet" href="../../assets/css/tab-card.css?v=3">
  <link rel="stylesheet" href="../../assets/css/fonts.css?v=3">
  <link rel="stylesheet" href="../../assets/css/mobile-frame.css?v=3">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      font-family: 'Noto Sans KR', 'SUITE', 'Poppins', sans-serif;
      color: #fff;
      overflow-y: scroll;
      padding-bottom: 110px;
      max-width: 430px;
      margin: 0 auto;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* ===== TOP FIXED WRAPPER ===== */
    .top-fixed-wrapper {
      position: sticky;
      top: 0;
      z-index: 110;
    }
    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      height: 44px;
      background: #000;
      border-bottom: 1px solid #3a3a3a;
    }
    .header-back {
      font-size: 22px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      padding: 4px 0;
    }
    .header-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hamburger {
      font-size: 18px;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      background: none;
      border: none;
    }



    /* ===== STICKY TOP AREA (메시지 + 탭) ===== */
    .sticky-top-area {
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 5px 0 5px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sticky-msg {
      text-align: center;
      padding: 4px 16px 2px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    /* ===== CATEGORY TABS ===== */
    .tab-bar {
      background: #000;
      display: flex;
      padding: 4px 16px 4px;
    }
    .tab-segmented {
      display: flex;
      width: fit-content;
      margin: 0 auto;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      overflow: hidden;
    }
    .tab-btn {
      flex: none;
      padding: 2px 20px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Poppins', 'SUITE', sans-serif;
      line-height: 1.3;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn + .tab-btn {
      border-left: 1px solid rgba(255,255,255,0.2);
    }
    .tab-btn.active-film, .tab-btn.active-book {
      background: rgba(255,255,255,0.1);
      color: #c9a96e;
      font-weight: 700;
    }

    /* ===== CARD LIST ===== */
    .card-list {
      padding: 0 12px;
      margin-top: 8px;
    }

    /* ===== FILM CARD ===== */
    .work-card-wrap {
      position: relative;
      margin-bottom: 6px;
      cursor: pointer;
    }
    .work-card-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .work-badge {
      position: absolute;
      top: 60px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      pointer-events: none;
    }
    .work-detail-btn {
      position: absolute;
      top: 3px;
      right: 20px;
      background: none;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-weight: 400;
      padding: 4px 4px;
      border: none;
      cursor: pointer;
    }
    .work-card-info { margin-bottom: 8px; }
    .work-title {
      font-size: 14px;
      color: #fff;
      font-weight: 700;
      margin: 6px 0 2px;
    }
    .work-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin: 0;
    }

    /* ===== BOOK GRID ===== */
    .book-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 12px;
      margin-top: 8px;
    }
    .book-card {
      position: relative;
      background: #111;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }
    .book-card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
    }
    .book-card .work-badge {
      top: 8px;
      left: 8px;
      right: auto;
      font-size: 10px;
      padding: 2px 7px;
      z-index: 10;
    }
    .book-card .work-detail-btn {
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.58);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 11px;
      z-index: 10;
    }

    /* ===== POSTER OVERLAY ===== */
    #poster-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #poster-overlay.visible {
      display: flex;
    }
    #poster-overlay img {
      max-width: 90%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
    }
    #poster-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      color: rgba(255,255,255,0.7);
      border: none;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    /* ===== DETAIL VIEW ===== */
    #view-detail { display: none; }

    .content-wrap { padding: 0 16px; }

    .section-card {
      background: #111;
      border-radius: 16px;
      padding: 16px;
      margin-top: 8px;
    }
    .detail-meta-line {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
    }
    .detail-film-title {
      font-size: 18px;
      font-weight: 700;
      font-style: italic;
      color: #fff;
      margin: 0 0 4px;
      line-height: 1.3;
    }
    .detail-film-subtitle {
      font-size: 13px;
      color: #c9a96e;
      margin: 0 0 14px;
    }
    .awards-list {
      list-style: none;
      margin-bottom: 14px;
    }
    .awards-list li {
      font-size: 13px;
      color: #fff;
      margin-bottom: 4px;
    }
    .detail-intro {
      font-size: 13px;
      color: #aaa;
      line-height: 1.75;
      margin-bottom: 16px;
    }
    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .link-btn {
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 13px;
      color: #fff;
      background: transparent;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>

/* ===== SVG3 카드 생성 ===== */
function buildFilmCard(film) {
  const clipId = 'film-clip-' + film.id;
  const imgEsc = film.image.replace(/'/g, "\\'");
  return `
    <div class="work-card-wrap" onclick="openPoster('${imgEsc}')">
      <svg viewBox="0 0 320 380" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="${clipId}">
            <path d="M 14 366 Q 14 380 26 380 L 294 380 Q 306 380 306 366 L 306 40 Q 306 28 294 28 L 238 28 Q 226 28 222 19 Q 218 10 206 10 L 26 10 Q 14 10 14 22 Z"/>
          </clipPath>
        </defs>
        <rect width="320" height="380" fill="#111" clip-path="url(#${clipId})"/>
        <image href="${film.image}"
          x="0" y="0" width="320" height="380"
          clip-path="url(#${clipId})" preserveAspectRatio="xMidYMid meet"/>
        <polygon points="206,10 306,10 306,28 238,28" fill="#000000"/>
        <path d="M 14 366 Q 14 380 26 380 L 294 380 Q 306 380 306 366 L 306 40 Q 306 28 294 28 L 238 28 Q 226 28 222 19 Q 218 10 206 10 L 26 10 Q 14 10 14 22 Z"
          fill="none" stroke="rgba(150,150,150,0.5)" stroke-width="1"/>
      </svg>
      <span class="work-badge">${film.badge}</span>
      <button class="work-detail-btn" onclick="event.stopPropagation(); showDetail(${film.id})">내용보기</button>
    </div>
  `;
}

/* ===== 도서 카드 생성 ===== */
function buildBookCard(book) {
  const imgEsc = book.image.replace(/'/g, "\\'");
  return `
    <div class="book-card">
      <img src="${book.image}" alt="도서 표지" loading="lazy" onclick="openPoster('${imgEsc}')">
      <button class="work-detail-btn" onclick="event.stopPropagation(); showBookDetail(${book.id})">내용보기</button>
    </div>
  `;
}

/* ===== 도서 상세 화면 ===== */
function showBookDetail(idx) {
  const book = BOOKS[idx];
  if (!book) return;

  document.getElementById('detail-header-title').textContent = book.title;

  const descHtml = book.desc.map(p => `<p class="detail-intro">${p}</p>`).join('');
  const linksHtml = book.links.map(l =>
    `<a class="link-btn" href="${l.url}" target="_blank">${l.label}</a>`
  ).join('');

  document.getElementById('detail-body').innerHTML = `
    <p class="detail-meta-line">${book.type} · ${book.year}</p>
    <p class="detail-film-title" style="font-style:normal;">${book.title}</p>
    <p class="detail-film-subtitle">${book.author}</p>
    ${descHtml}
    <div class="link-row" style="margin-top:16px;">${linksHtml}</div>
  `;

  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  window.scrollTo(0, 0);
}

/* ===== 렌더링 ===== */
function renderFilms() {
  const el = document.getElementById('section-film');
  el.innerHTML = FILMS.map(buildFilmCard).join('');
}

function renderBooks() {
  const el = document.getElementById('section-book');
  el.innerHTML = BOOKS.map(buildBookCard).join('');
}

/* ===== 탭 전환 ===== */
function switchTab(tab) {
  const filmSection = document.getElementById('section-film');
  const bookSection = document.getElementById('section-book');
  const tabFilm = document.getElementById('tab-film');
  const tabBook = document.getElementById('tab-book');

  if (tab === 'film') {
    filmSection.style.display = 'block';
    bookSection.style.display = 'none';
    tabFilm.className = 'tab-btn active-film';
    tabBook.className = 'tab-btn';
  } else {
    filmSection.style.display = 'none';
    bookSection.style.display = 'grid';
    tabFilm.className = 'tab-btn';
    tabBook.className = 'tab-btn active-book';
  }
}

/* ===== 포스터 오버레이 ===== */
function openPoster(imgSrc) {
  const overlay = document.getElementById('poster-overlay');
  const img = document.getElementById('poster-img');
  img.src = imgSrc;
  overlay.classList.add('visible');
}

function closePoster() {
  const overlay = document.getElementById('poster-overlay');
  overlay.classList.remove('visible');
  document.getElementById('poster-img').src = '';
}

/* ===== 상세 화면 ===== */
function showDetail(idx) {
  const film = FILMS.find(f => f.id === idx);
  if (!film) return;

  document.getElementById('detail-header-title').textContent = film.title;

  const awardsHtml = film.awards.map(a => `<li>🏆 ${a}</li>`).join('');
  const introHtml = Array.isArray(film.intro)
    ? film.intro.map(p => `<p class="detail-intro">${p}</p>`).join('')
    : `<p class="detail-intro">${film.intro}</p>`;
  const metaHtml = film.meta
    ? film.meta.map(m => `<p class="detail-intro" style="margin-bottom:4px;"><span style="color:#888;">${m.label}:</span> ${m.value}</p>`).join('')
    : '';
  const linksHtml = film.links.map(l =>
    `<a class="link-btn" href="${l.url}" target="_blank">${l.label}</a>`
  ).join('');

  document.getElementById('detail-body').innerHTML = `
    <p class="detail-meta-line">${film.type} · ${film.year}</p>
    <p class="detail-film-title">${film.title}</p>
    ${film.titleKo ? `<p class="detail-film-subtitle">${film.titleKo}</p>` : '<div style="margin-bottom:14px;"></div>'}
    <ul class="awards-list">${awardsHtml}</ul>
    ${introHtml}
    ${metaHtml ? `<div style="margin-top:12px;border-top:1px solid #222;padding-top:12px;">${metaHtml}</div>` : ''}
    <div class="link-row" style="margin-top:16px;">${linksHtml}</div>
  `;

  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-list').style.display = 'block';
  window.scrollTo(0, 0);
}



/* ===== 스크롤바 ===== */
let scrollTimer;
document.addEventListener('scroll', function () {
  document.body.classList.add('is-scrolling');
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(function () {
    document.body.classList.remove('is-scrolling');
  }, 800);
});

/* ===== 초기 렌더링 ===== */
renderFilms();
renderBooks();
</script>
