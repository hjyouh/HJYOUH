<style>
  /* ===== 홈 섹션 ===== */
  .home-section {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
  }

  /* ===== 슬라이드쇼 ===== */
  .slideshow-container {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    z-index: 1;
  }

  .slide {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .slide.active { display: block; }

  .slide img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* 반투명 오버레이 */
  .slide-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: transparent;
    z-index: 2;
  }

  /* 화살표 */
  .prev-btn, .next-btn {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
    color: #fff;
    border: none;
    font-size: 22px;
    padding: 12px 16px;
    cursor: pointer;
    z-index: 10;
    border-radius: 4px;
    transition: all 0.3s ease;
  }
  .prev-btn { left: 20px; }
  .next-btn { right: calc(var(--panel-width) + 10px); }
  .prev-btn:hover, .next-btn:hover { background: rgba(0,0,0,0.7); color: #c9a96e; }

  /* 점 인디케이터 */
  .dots-container {
    position: absolute;
    bottom: 28px;
    left: calc(50% - 160px);
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .dot.active {
    background: #c9a96e;
    border-color: #c9a96e;
    width: 26px;
    border-radius: 5px;
  }

  /* 좌하단 메시지 박스 */
  .message-box {
    position: fixed;
    bottom: 36px;
    left: 36px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 20px 26px;
    max-width: 380px;
    z-index: 10;
  }

  .message-box-text {
    font-size: 20px;
    line-height: 1.65;
    color: #fff;

  }

  .message-box-rating {

    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
  }

  .stars { color: #c9a96e; }

  /* ===== 우측 사이드 패널 ===== */
  .desktop-side-panel {
    position: absolute;
    right: 0;
    top: var(--header-height);
    width: var(--panel-width);
    bottom: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 8px;
    background: #0d0d0d;

  /* Gusto 스타일 카드 - 이미지 배경 + 텍스트 오버레이 */

    flex: 1 1 0;
    min-height: 0;
    border-radius: 15px;
    overflow: hidden;

</style>

<script>
  function initHomePage() {
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    const prevBtn = document.querySelector('.prev-btn');
    const nextBtn = document.querySelector('.next-btn');
    let current = 0;
    let timer = null;

    function showSlide(n) {
      if (n >= slides.length) current = 0;
      if (n < 0) current = slides.length - 1;
      slides.forEach(s => s.classList.remove('active'));
      dots.forEach(d => d.classList.remove('active'));
      slides[current].classList.add('active');
      if (dots[current]) dots[current].classList.add('active');
    }

    function next() { current++; showSlide(current); resetTimer(); }
    function prev() { current--; showSlide(current); resetTimer(); }
    function startTimer() { timer = setInterval(() => { current++; showSlide(current); }, 5000); }
    function resetTimer() { clearInterval(timer); startTimer(); }

    if (prevBtn) prevBtn.addEventListener('click', prev);
    if (nextBtn) nextBtn.addEventListener('click', next);

    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => { current = i; showSlide(current); resetTimer(); });
    });

    const container = document.querySelector('.slideshow-container');
    if (container) {
      container.addEventListener('mouseenter', () => clearInterval(timer));
      container.addEventListener('mouseleave', startTimer);
    }

    showSlide(current);
    startTimer();

    // Apply homeConfig from localStorage if available
    try {
      const cfg = JSON.parse(localStorage.getItem('homeConfig') || '{}');
      const msgEl = document.querySelector('.message-box-text');
      const starsEl = document.querySelector('.message-box-rating .stars');
      const ratingEl = document.querySelector('.message-box-rating span:last-child');
      if (cfg.message && msgEl) msgEl.innerHTML = cfg.message.replace(/\n/g, '<br>');
      if (cfg.stars && starsEl) starsEl.textContent = cfg.stars;
      if (cfg.rating && ratingEl) ratingEl.textContent = cfg.rating;
    } catch(e) {}
  }

  initHomePage();
</script>
