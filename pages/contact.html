<div class="con-popup-overlay" id="conConfirmPopup">
  <div class="con-popup-box">
    <div class="con-popup-title">본인 확인</div>
    <div class="con-popup-desc">스팸 방지를 위해 연락처를 한 번 더 입력해주세요</div>
    <input class="con-input" type="tel" id="con-phone-confirm" placeholder="연락처를 다시 입력하세요">
    <div class="con-popup-error" id="conPhoneError">연락처가 일치하지 않습니다</div>
    <div class="con-popup-btns">
      <button class="con-popup-cancel" onclick="closeConPopup()">취소</button>
      <button class="con-popup-confirm" onclick="submitConForm()">확인 및 발송</button>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
  (function() {
    emailjs.init('dY4Rp3auQyGaDLiNF');

    window.openConPopup = function() {
      const name    = document.getElementById('con-name').value.trim();
      const email   = document.getElementById('con-email').value.trim();
      const phone   = document.getElementById('con-phone').value.trim();
      const message = document.getElementById('con-message').value.trim();
      if (!name || !email || !phone || !message) {
        alert('모든 항목을 입력해주세요.');
        return;
      }
      document.getElementById('con-phone-confirm').value = '';
      document.getElementById('conPhoneError').style.display = 'none';
      document.getElementById('conConfirmPopup').classList.add('visible');
    };

    window.closeConPopup = function() {
      document.getElementById('conConfirmPopup').classList.remove('visible');
    };

    document.getElementById('conConfirmPopup').addEventListener('click', function(e) {
      if (e.target === this) closeConPopup();
    });

    window.submitConForm = function() {
      const phone        = document.getElementById('con-phone').value.trim();
      const phoneConfirm = document.getElementById('con-phone-confirm').value.trim();
      const errorEl      = document.getElementById('conPhoneError');

      if (phone !== phoneConfirm) {
        errorEl.style.display = 'block';
        return;
      }
      errorEl.style.display = 'none';

      emailjs.send('service_5conamd', 'template_o93omhl', {
        from_name:  document.getElementById('con-name').value.trim(),
        from_email: document.getElementById('con-email').value.trim(),
        from_phone: phone,
        message:    document.getElementById('con-message').value.trim(),
      })
      .then(() => {
        closeConPopup();
        alert('문의가 접수되었습니다. 24시간 이내 답변 드리겠습니다.');
        document.getElementById('conForm').reset();
      })
      .catch(() => {
        closeConPopup();
        alert('발송에 실패했습니다. hjyouh@naver.com으로 직접 연락해주세요.');
      });
    };
  })();
</script>
