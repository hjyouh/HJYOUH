  var DEFAULT_LECTURES = LECTURES_DATA.slice();

  function loadLecturesData() {
    try {
      const saved = localStorage.getItem('lecturesData');
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return DEFAULT_LECTURES;
  }

  function showLecPanelEmpty() {
    const empty = document.getElementById('lecPanelEmpty');
    const detail = document.getElementById('lecPanelDetail');
    if (empty) empty.style.display = 'flex';
    if (detail) detail.style.display = 'none';
    document.querySelectorAll('.lec-card').forEach(c => c.classList.remove('active'));
  }

  function renderLecGrid() {
    const grid = document.getElementById('lecGrid');
    if (!grid) return;
    const data = loadLecturesData();
    grid.innerHTML = data.map((lec, i) => `
      <div class="lec-card" data-idx="${i}" onclick="openLecDetail(${i})">
        <div class="lec-card-inner" style="background-image:url('${lec.image || ''}')">
          <span class="lec-card-badge">${lec.category}</span>
          <div class="lec-card-grad"></div>
          <div class="lec-card-info">
            <span class="lec-card-name">${lec.title}</span>
            <span class="lec-card-dur">⏱ ${lec.duration}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function openLecDetail(index) {
    const data = loadLecturesData();
    const lec = data[index];
    if (!lec) return;

    // 1) 왼쪽 확대 이미지 레이어 활성화
    const zoomLayer = document.getElementById('lecZoomLayer');
    const zoomImg = document.getElementById('lecZoomImg');
    if (zoomLayer && zoomImg && lec.image) {
      zoomImg.style.backgroundImage = `url('${lec.image}')`;
      zoomLayer.classList.add('active');
    }

    // 2) 선택된 카드를 X 플레이스홀더로 교체
    document.querySelectorAll('.lec-card').forEach(c => {
      c.classList.remove('selected-placeholder', 'active');
    });
    const activeCard = document.querySelector(`.lec-card[data-idx="${index}"]`);
    if (activeCard) {
      activeCard.classList.add('selected-placeholder');
      activeCard.innerHTML = `
        <div class="lec-card-inner">
          <div class="lec-card-x">✕</div>
        </div>
      `;
    }

    // 3) 우측 패널에 상세 내용 표시
    const empty = document.getElementById('lecPanelEmpty');
    const detail = document.getElementById('lecPanelDetail');
    if (!detail) return;

    const items = lec.curriculum.map((c, i) => `
      <li class="lec-cur-item">
        <span class="lec-cur-num">${String(i+1).padStart(2,'0')}</span>
        <span class="lec-cur-body">
          <span class="lec-cur-title">${c.title}</span>
          <span class="lec-cur-desc">${c.desc}</span>
        </span>
      </li>
    `).join('');

    detail.innerHTML = `
      <div class="lec-detail-top">
        <span class="lec-detail-cat">${lec.category}</span>
        <button class="lec-detail-back" onclick="closeLecZoom()">← 목록</button>
      </div>
      <h2 class="lec-detail-title">${lec.emoji} ${lec.title}</h2>
      <p class="lec-detail-subtitle">${lec.subtitle}</p>
      <p class="lec-detail-intro">${lec.intro}</p>
      <div class="lec-detail-meta">
        <span>⏱ ${lec.duration}</span>
        <span class="meta-sep">·</span>
        <span>${lec.format}</span>
      </div>
      <p class="lec-detail-sec-title">커리큘럼</p>
      <ul class="lec-cur-list">${items}</ul>
      <p class="lec-detail-sec-title">준비물</p>
      <p class="lec-detail-supplies">💻 ${lec.supplies}</p>
    `;

    if (empty) empty.style.display = 'none';
    detail.style.display = 'block';
    detail.scrollTop = 0;
  }

  function closeLecZoom() {
    // 확대 레이어 닫기
    const zoomLayer = document.getElementById('lecZoomLayer');
    if (zoomLayer) zoomLayer.classList.remove('active');

    // 패널 초기화
    showLecPanelEmpty();

    // 그리드 재렌더 (X 카드 복원)
    renderLecGrid();
  }

  function initLecturesPage() {
    renderLecGrid();
    showLecPanelEmpty();
  }

  if (document.getElementById('lecGrid')) {
    initLecturesPage();
  }
})();
</script>
