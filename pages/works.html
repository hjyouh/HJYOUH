  let currentTab = 'film';
  let selectedId = null;

  function loadWorksData() {
    try {
      const saved = localStorage.getItem('worksData');
      if (saved) {
        const parsed = JSON.parse(saved);
        return {
          film: [...DEFAULT_WORKS.film, ...(parsed.film || [])],
          book: [...DEFAULT_WORKS.book, ...(parsed.book || [])]
        };
      }
    } catch(e) {}
    return DEFAULT_WORKS;
  }

  /* ===== LAYOUT CLASS BY COUNT ===== */
  function getLayoutClass(count) {
    if (count <= 4) return 'layout-4';
    if (count === 5) return 'layout-5';
    if (count === 6) return 'layout-6';
    if (count === 7) return 'layout-7';
    return 'layout-many';
  }

  /* ===== RENDER GRID ===== */
  function renderGrid(tab) {
    const data = loadWorksData();
    const items = data[tab] || [];
    const grid = document.getElementById('cardGrid');
    const ratioClass = tab === 'film' ? 'ratio-film' : 'ratio-book';
    const icon = tab === 'film' ? '🎬' : '📚';

    // Remove old layout classes, set new one
    grid.className = 'card-grid ' + getLayoutClass(items.length);

    grid.innerHTML = items.map(item => `
      <div class="work-card ${selectedId === item.id ? 'active' : ''}"
           data-id="${item.id}"
           onclick="selectWork('${item.id}', '${tab}')">
        <div class="card-img-wrap ${ratioClass}">
          ${item.thumb
            ? `<img src="${item.thumb}" alt="${item.title}">`
            : `<span class="card-thumb-icon">${icon}</span>`
          }
          ${item.badge ? `<span class="card-badge">${item.badge}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  /* ===== SWITCH TAB ===== */
  function switchTab(tab) {
    currentTab = tab;
    selectedId = null;
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    const zoomLayer = document.getElementById('worksZoomLayer');
    if (zoomLayer) zoomLayer.classList.remove('active');
    renderGrid(tab);
    showPanelEmpty();
  }

  /* ===== SELECT WORK: 강의(openLecDetail) 패턴 완전 동일 ===== */
  function selectWork(id, tab) {
    selectedId = id;
    const data = loadWorksData();
    const item = (data[tab] || []).find(i => i.id === id);
    if (!item) return;

    // 1) 줌 레이어 활성화 (강의 패턴 그대로)
    const zoomLayer = document.getElementById('worksZoomLayer');
    const zoomImg = document.getElementById('worksZoomImg');
    if (zoomLayer && zoomImg && item.thumb) {
      zoomImg.style.backgroundImage = 'url("' + item.thumb + '")';
      zoomLayer.classList.add('active');
    }

    // 2) 선택된 카드 X로 교체 (강의 패턴 그대로)
    document.querySelectorAll('.work-card').forEach(c => {
      c.classList.remove('selected-placeholder', 'active');
    });
    const activeCard = document.querySelector('.work-card[data-id="' + id + '"]');
    if (activeCard) {
      const ratioClass = tab === 'film' ? 'ratio-film' : 'ratio-book';
      activeCard.classList.add('selected-placeholder');
      activeCard.innerHTML = '<div class="card-img-wrap ' + ratioClass + '"><div class="work-card-x">✕</div></div>';
    }

    // 3) 우측 패널
    showPanelDetail(item, tab);
  }

  function closeWorksZoom() {
    const zoomLayer = document.getElementById('worksZoomLayer');
    if (zoomLayer) zoomLayer.classList.remove('active');
    selectedId = null;
    showPanelEmpty();
    renderGrid(currentTab);
  }

  /* ===== PANEL ===== */
  function showPanelDetail(item, tab) {
    document.getElementById('panelEmpty').style.display = 'none';
    const detail = document.getElementById('panelDetail');
    detail.style.display = 'flex';

    document.getElementById('detailTag').textContent =
      tab === 'film' ? `AI 영화 · ${item.year}` : `도서 · ${item.year}`;

    const titleEl = document.getElementById('detailTitle');
    if (tab === 'film' && item.titleEn && item.titleEn !== item.title) {
      titleEl.innerHTML = `${item.title} <span style="font-size:16px;font-weight:400;color:var(--text-secondary);font-style:italic;">${item.titleEn}</span>`;
    } else {
      titleEl.textContent = item.title;
    }

    document.getElementById('detailYear').textContent =
      tab === 'film' ? `제작연도: ${item.year}` : `출판연도: ${item.year}`;

    const awardsEl = document.getElementById('detailAwards');
    if (tab === 'film' && item.awards?.length) {
      awardsEl.style.display = 'flex';
      awardsEl.innerHTML = item.awards.map(a =>
        `<div class="award-item"><span class="award-dot"></span><span>${a}</span></div>`
      ).join('');
    } else {
      awardsEl.style.display = 'none';
    }

    const synopsisEl = document.getElementById('detailSynopsis');
    const paragraphs = tab === 'film' ? item.synopsisFull : item.descFull;
    if (paragraphs?.length) {
      synopsisEl.style.display = 'flex';
      synopsisEl.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');
    } else {
      synopsisEl.style.display = 'none';
    }

    const infoEl = document.getElementById('detailInfo');
    if (item.info?.length) {
      infoEl.style.display = 'flex';
      infoEl.innerHTML = item.info.map(i => `<div class="detail-info-item">${i}</div>`).join('');
    } else {
      infoEl.style.display = 'none';
    }

    const linksEl = document.getElementById('detailLinks');
    if (item.links?.length) {
      linksEl.style.display = 'flex';
      linksEl.innerHTML = item.links.map(l =>
        `<a class="detail-link-btn" href="${l.url}" target="_blank" rel="noopener">▶ ${l.label}</a>`
      ).join('');
    } else {
      linksEl.style.display = 'none';
    }

    document.getElementById('detailDesc').style.display = 'none';
  }

  function showPanelEmpty() {
    document.getElementById('panelEmpty').style.display = 'flex';
    document.getElementById('panelDetail').style.display = 'none';
  }

  function initWorksPage() {
    currentTab = 'film';
    selectedId = null;
    renderGrid('film');
    showPanelEmpty();
  }

  // initWorksPage is called by main.js after injection; fallback for direct load
  if (document.getElementById('cardGrid')) initWorksPage();
</script>
