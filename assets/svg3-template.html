<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG 3 Template – 320×450 (우측 상단 노치)</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #303030;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <!--
    SVG 3: SVG 2 (우측 상단 노치) 동일 스타일, 크기만 320×450
    viewBox: 0 0 320 450
    카드 영역: x=14~306, y=10~448  (사방 여백 유지)
    노치: 우측 상단, x=206~306, y=10~28
    코너 반경: ~12px
  -->
  <svg width="320" height="450" viewBox="0 0 320 450" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="svg3Clip">
        <path d="
          M 14 436 Q 14 448 26 448
          L 294 448 Q 306 448 306 436
          L 306 40 Q 306 28 294 28
          L 238 28 Q 226 28 222 19
          Q 218 10 206 10
          L 26 10 Q 14 10 14 22 Z
        "/>
      </clipPath>
    </defs>

    <!-- 배경 -->
    <rect width="320" height="450" fill="#111"/>

    <!-- 이미지 (클립) -->
    <image
      href="YOUR_IMAGE_URL_HERE"
      x="0" y="0" width="320" height="450"
      clip-path="url(#svg3Clip)"
      preserveAspectRatio="xMidYMid slice"
    />

    <!-- 노치 삼각형 채우기 (배경색으로 덮기) -->
    <polygon points="206,10 306,10 306,28 238,28" fill="#000000"/>

    <!-- 카드 테두리 -->
    <path d="
      M 14 436 Q 14 448 26 448
      L 294 448 Q 306 448 306 436
      L 306 40 Q 306 28 294 28
      L 238 28 Q 226 28 222 19
      Q 218 10 206 10
      L 26 10 Q 14 10 14 22 Z
    "
    fill="none"
    stroke="rgba(150,150,150,0.7)"
    stroke-width="1"/>

  </svg>

</body>
</html>
